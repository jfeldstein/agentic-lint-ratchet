# Lint-ratchet contract for this repository (consumed by scheduled composite action default config_path).

repo:
  repository: jfeldstein/agentic-lint-ratchet
  base_branch: main
  local_path: /workspace/target

setup:
  max_fix_files_without_ignore: 10
  max_scope_steps_without_source_changes: 3
  max_scope_fix_files: 10
  max_scope_fix_loc: 400
  max_tighten_steps_without_source_changes: 3
  max_tighten_fix_files: 10
  max_tighten_fix_loc: 400
