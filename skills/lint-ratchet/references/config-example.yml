# Copy to .lint-ratchet.config.yml at the root of your target repository.
# Override the path via LINT_RATCHET_CONFIG_PATH env var or the config_path action input.

repo:
  repository: "owner/repo-name"   # GitHub owner/name (not a URL)
  base_branch: "main"             # omit to use the repo's default branch
  local_path: "/workspace/repo"   # checkout path inside the ratchet worker (optional)

setup:
  max_fix_files_without_ignore: 10  # if violations touch more files than this, use config-level
                                    # path excludes instead of fixing everything at once
