[project]
name = "agentic-lint-ratchet"
version = "0"
requires-python = ">=3.11"
readme = "README.md"

[tool.ruff]
target-version = "py311"
src = ["scripts"]

[tool.ruff.lint]
select = ["E", "F", "W", "I", "UP"]

[tool.ruff.format]
quote-style = "double"

# Ratchet queue — stacks deferred (not scanned by Ruff):
# - Helm/YAML: templates/, Chart.yaml, Chart.lock, values.yaml, workflows/, actions/, .github/**/*.yml(yaml)
# - Markdown: PROMPT.md, README.md, docs/
# - Bats: test/*.bats
