[project]
name = "agentic-lint-ratchet"
version = "0"
requires-python = ">=3.11"
readme = "README.md"

[tool.ruff]
target-version = "py311"
src = ["scripts"]
# Active coverage: scripts/ (see CI). Repo-wide `ruff check` uses Ruff defaults;
# non-Python areas listed in eslint.config.js are prose/YAML/Helm (separate tooling).

[tool.ruff.lint]
select = ["E", "F", "W", "I", "UP"]

[tool.ruff.format]
quote-style = "double"

