# Copy to .lint-ratchet.config.yml at the root of your target repository.
# Override the path via LINT_RATCHET_CONFIG_PATH env var or the config_path action input.

repo:
  repository: "invisible-tech/agentic-construct"
  base_branch: "develop"
  # Checkout directory inside the ratchet worker pod (emptyDir or PVC).
  local_path: "/workspace/agentic-construct"

setup:
  max_fix_files_without_ignore: 10
  # Bite behavior (optional):
  # Scope and tighten behavior use the same bite controls: if scope peels or tightening
  # do not "bite" (no source edits required), still open a PR after this many in-order
  # steps to lock in accumulated config progress; next run continues.
  # If a bite would require too-large cleanup, revert that bite, document the backoff,
  # and choose the next smaller in-order leaf / tighten step when available.
  max_bite_steps_without_source_changes: 3
  max_bite_fix_files: 10
  max_bite_fix_loc: 400
