# Copy to .lint-ratchet.config.yml at the root of your target repository.
# Override the path via LINT_RATCHET_CONFIG_PATH env var or the config_path action input.

repo:
  repository: "invisible-tech/agentic-construct"
  base_branch: "develop"
  # Checkout directory inside the ratchet worker pod (emptyDir or PVC).
  local_path: "/workspace/agentic-construct"

setup:
  max_fix_files_without_ignore: 10
  # Tighten behavior (optional):
  # - max_tighten_steps_without_source_changes: if tightening doesn't "bite" (no source edits required),
  #   still open a PR after this many tighten steps to lock in config progress; next run continues.
  # - max_tighten_fix_files / max_tighten_fix_loc: if a tighten would require too-large cleanup,
  #   revert that tighten and choose a smaller bite.
  max_tighten_steps_without_source_changes: 3
  max_tighten_fix_files: 10
  max_tighten_fix_loc: 400
