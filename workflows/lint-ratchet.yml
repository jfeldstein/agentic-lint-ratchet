# Copy this file to .github/workflows/lint-ratchet.yml in your target repository.
#
# Setup required before this workflow can open PRs:
# Repository → Settings → Actions → General → Workflow permissions
#   • "Read and write permissions"
#   • "Allow GitHub Actions to create and approve pull requests"
# See: https://github.com/jfeldstein/agentic-lint-ratchet#required-allow-github-actions-to-create-pull-requests

name: Lint ratchet (scheduled)

on:
  schedule:
    # Once per day at 06:15 UTC (adjust as needed)
    - cron: "15 6 * * *"
  workflow_dispatch:
    inputs:
      cursor_api_key:
        description: "Cursor API key (overrides CURSOR_API_KEY secret)"
        required: false
        type: string

concurrency:
  group: lint-ratchet-${{ github.repository }}
  cancel-in-progress: false

# Set permissions on GITHUB_TOKEN to allow updates to GitHub Actions workflows
permissions:
  actions: write
  contents: write
  pull-requests: write
  checks: read
  statuses: read

jobs:
  ratchet:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - name: Run lint-ratchet (composite action)
        uses: jfeldstein/agentic-lint-ratchet/.github/actions/lint-ratchet@lint-ratchet-action-v1.1.0
        env:
          # Required when agent: pi
          LITELLM_BASE_URL: ${{ secrets.LITELLM_BASE_URL }}
          LITELLM_API_KEY: ${{ secrets.LITELLM_API_KEY }}
          PI_MODEL: ${{ vars.PI_MODEL }}
        with:
          # Set to "cursor" or "pi"
          agent: cursor
          cursor_api_key: ${{ inputs.cursor_api_key || secrets.CURSOR_API_KEY }}
