name: Lint ratchet (Cursor, scheduled)

on:
  schedule:
    # Once per day at 06:15 UTC (adjust as needed)
    - cron: "15 6 * * *"
  workflow_dispatch:
    inputs:
      cursor_api_key:
        description: "Cursor API key (overrides CURSOR_API_KEY secret)"
        required: false
        type: string

concurrency:
  group: lint-ratchet-${{ github.repository }}
  cancel-in-progress: false

# Required for creating branches + PRs via the default GITHUB_TOKEN.
# To allow the agent to push .github/workflows/ files, also supply a PAT with
# `workflow` scope via the `github_token` input or a GH_TOKEN repository secret.
permissions:
  contents: write
  pull-requests: write

jobs:
  ratchet:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - name: Run lint-ratchet (composite action)
        uses: jfeldstein/agentic-lint-ratchet/.github/actions/lint-ratchet@main
        with:
          cursor_api_key: ${{ inputs.cursor_api_key || secrets.CURSOR_API_KEY }}
