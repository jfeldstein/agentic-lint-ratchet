# Copy to `.github/workflows/ci.yml` (requires a token with **workflow** scope for git push).
#
# Lint scope map (mirrors .github/workflows/ci.yml in this repo):
# - Active: scripts/*.mjs (ESLint), scripts/*.py (Ruff).
# - Active (yamllint): .github/**/*.yml, repo .lint-ratchet.config.yml, config/, workflows/, Chart.yaml,
#   actions/*.yml, values.yaml (see package.json lint:yaml).
# - Deferred: Helm templates/ (Go templates), Markdown, Bats/shell — see checked-in workflow.

name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install JS dependencies
        run: npm ci

      - name: Lint JavaScript
        run: npm run lint:js

      - name: Lint Python
        run: pip install ruff==0.11.10 && ruff check scripts && ruff format --check scripts

      - name: Unit tests (bats)
        run: npm test
