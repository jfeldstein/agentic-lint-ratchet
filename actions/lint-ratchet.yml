# Composite action — called by the scheduled workflow.
# The calling workflow must have:
#   permissions:
#     actions: write
#     contents: write
#     pull-requests: write
#     checks: read
#     statuses: read
# and the repository must allow Actions to create PRs:
#   Settings → Actions → General → Workflow permissions
#   → "Allow GitHub Actions to create and approve pull requests"
# See: https://github.com/jfeldstein/agentic-lint-ratchet#required-allow-github-actions-to-create-pull-requests

name: Lint Ratchet
description: Run the lint-ratchet agent against a checked-out repository

inputs:
  agent:
    description: Agent runtime to use (cursor or pi)
    required: false
    default: cursor
  cursor_api_key:
    description: Cursor API key (user or service account)
    required: false
  skill_version:
    description: >
      Semver of the skills/lint-ratchet artifact expected by this action release (must match
      skills/lint-ratchet/package.json at the same git ref). Documentation only unless you add checks.
    required: false
    default: "1.1.0"
  action_repository:
    description: Repository that contains the lint-ratchet runner code
    required: false
    default: jfeldstein/agentic-lint-ratchet
  action_ref:
    description: >
      Git ref for the runner checkout (set this when pinning the action to a tag/sha so the runner
      checkout matches).
    required: false
    default: "main"
  config_path:
    description: >
      Path to the lint-ratchet config file (relative to target repo root).
      Overridden by the LINT_RATCHET_CONFIG_PATH env var if set.
      If the file does not exist, the dedupe preflight is skipped (fresh repo).
    required: false
    default: .lint-ratchet.config.yml
  prompt_file:
    description: Prompt markdown file path (relative to the runner checkout)
    required: false
    default: skills/lint-ratchet/resources/RATCHET.md
  cursor_model:
    description: Cursor model id
    required: false
    default: composer-2
  node_version:
    description: Node.js version for the runner
    required: false
    default: "22"

runs:
  using: composite
  steps:
    - name: Mask API key
      if: ${{ inputs.cursor_api_key != '' }}
      shell: bash
      run: echo "::add-mask::${{ inputs.cursor_api_key }}"

    - name: Checkout target repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        path: target

    - name: Checkout lint-ratchet runner
      uses: actions/checkout@v4
      with:
        repository: ${{ inputs.action_repository }}
        ref: ${{ inputs.action_ref }}
        fetch-depth: 1
        path: lint-ratchet

    - name: Set up Node
      uses: actions/setup-node@v4
      with:
        node-version: ${{ inputs.node_version }}
        cache: npm
        cache-dependency-path: lint-ratchet/package-lock.json

    - name: Install npm dependencies
      shell: bash
      working-directory: lint-ratchet
      run: npm ci

    - name: Configure git identity for agent commits
      shell: bash
      working-directory: target
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

    - name: Preflight (dedupe) - skip if open signed lint-ratchet PR exists
      id: preflight
      shell: bash
      working-directory: target
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        set -euo pipefail

        # LINT_RATCHET_CONFIG_PATH env overrides the action input.
        CONFIG_PATH="${LINT_RATCHET_CONFIG_PATH:-${{ inputs.config_path }}}"

        if [[ ! -f "$CONFIG_PATH" ]]; then
          echo "No config file found at '$CONFIG_PATH'; skipping dedupe preflight (fresh repo)."
          echo "should_run=true" >> "$GITHUB_OUTPUT"
          exit 0
        fi

        CONFIG_ABS="$(python3 -c 'import os,sys; print(os.path.realpath(sys.argv[1]))' "$CONFIG_PATH")"
        LINT_RATCHET_SIGNATURE="#lint-ratchet-$(shasum -a 256 "$CONFIG_ABS" | awk '{print $1}')"
        echo "Config: $CONFIG_ABS"
        echo "Signature: $LINT_RATCHET_SIGNATURE"
        echo "LINT_RATCHET_CONFIG_PATH=$CONFIG_ABS" >> "$GITHUB_ENV"
        echo "LINT_RATCHET_SIGNATURE=$LINT_RATCHET_SIGNATURE" >> "$GITHUB_ENV"

        if gh pr list --repo "$GITHUB_REPOSITORY" --state open \
          --json number,body,headRefName \
          | jq -e --arg sig "$LINT_RATCHET_SIGNATURE" \
              'any(.[]; (.body | contains($sig)) and (.headRefName | startswith("lint-ratchet/")))' >/dev/null; then
          echo "Open signed lint-ratchet PR already exists; skipping run."
          echo "should_run=false" >> "$GITHUB_OUTPUT"
          exit 0
        fi

        echo "should_run=true" >> "$GITHUB_OUTPUT"

    - name: Run Lint-Ratchet Agent
      shell: bash
      working-directory: lint-ratchet
      if: ${{ steps.preflight.outputs.should_run == 'true' }}
      env:
        RATCHET_AGENT: ${{ inputs.agent }}
        CURSOR_API_KEY: ${{ inputs.cursor_api_key }}
        GH_TOKEN: ${{ github.token }}
        GITHUB_TOKEN: ${{ github.token }}
        GITHUB_WORKSPACE: ${{ github.workspace }}/target
        LINT_RATCHET_CONFIG_PATH: ${{ env.LINT_RATCHET_CONFIG_PATH }}
        LINT_RATCHET_SIGNATURE: ${{ env.LINT_RATCHET_SIGNATURE }}
        RATCHET_PROMPT_FILE: ${{ github.workspace }}/lint-ratchet/${{ inputs.prompt_file }}
        CURSOR_MODEL: ${{ inputs.cursor_model }}
        LITELLM_BASE_URL: ${{ env.LITELLM_BASE_URL }}
        LITELLM_API_KEY: ${{ env.LITELLM_API_KEY }}
        PI_MODEL: ${{ env.PI_MODEL }}
      run: npm run ratchet
