# Opens release PRs from conventional commits; on merge, creates GitHub Releases and git tags (e.g. lint-ratchet-action-v1.0.0).
# Uses GITHUB_TOKEN (release PRs/tags do not re-trigger workflows).

name: release-please

on:
  push:
    branches: [main]

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
