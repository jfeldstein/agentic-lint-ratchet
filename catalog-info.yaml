apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: "agentic-ratchets"
  title: "agentic-ratchets"
  description: "Agentic ratchets for throttled PR-based quality improvements; ships agentic-lint-ratchet (progressive linting) and agentic-mutation-testing-ratchet (progressive mutation testing) via Cursor Agent CLI in GitHub Actions."
  annotations:
    backstage.io/techdocs-ref: dir:.
    backstage.io/source-location: url:https://github.com/invisible-tech/agentic-ratchets

    # Required by Backstage GitHub integration and Jit security scanning.
    github.com/project-slug: invisible-tech/agentic-ratchets

    invisible.io/owner-user: "jordan.feldstein"
    invisible.io/repo-type: "Tool"

    # Data classification — required input for security posture tracking.
    # Valid values: internal, public, confidential, pii
    security/data-classification: "internal"


    # Jira JQL — used by Soundcheck to query Aikido-opened vulnerability tickets
    # and enforce SLO compliance (critical ≤7d, high ≤30d, medium ≤60d).
    atlassian.net/jql: 'project = YOUR_JIRA_KEY'


    # Path to this service's Terraform directory in the infra repo.
    # Used by Soundcheck to verify infrastructure is IaC-managed (not ClickOps).
    # Format: src/terraform/gcp/infra/<project-name>
    invisible.io/infra-path: "src/terraform/gcp/infra/agentic-ratchets"

spec:
  type: "tool"

  # IMPORTANT: lifecycle determines which security and compliance checks apply.
  # - experimental: service is in development; security health checks do NOT apply.
  # - production:   service is live; ALL security tracks and SLO checks apply.
  # - deprecated:   service is being retired; compliance checks still apply until removed.
  # Update this to 'production' when the service goes live. Do NOT leave as experimental
  # for production workloads — this is audited by the Security team.
  lifecycle: "experimental"

  owner: "group:default/invisible-tech"
  domain: "core-tech"

  slackChannel: "agentic-ratchets"

  jiraProject: "YOUR_JIRA_KEY"

  parameters:
  - title: Project details
    required:
      - name
      # - environments   # add here if you want it required
    properties:
      # ... other fields (name, owner, etc.) ...
      environments:
        title: Environments
        type: array
        items:
          type: string
          enum:
            - production
            - staging
            - demo
        uniqueItems: true
        default: ["production", "staging", "demo"]
        ui:widget: checkboxes
