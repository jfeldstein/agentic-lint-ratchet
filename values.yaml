# Hosted agent prompt: path into this chart package (DALC `systemPromptFile` → Helm `.Files.Get`).
# Exactly one of systemPrompt (inline) or systemPromptFile may be non-empty — see
# declarative-agent-library-chart values schema.
#
# lintRatchet.skillVersion mirrors skills/lint-ratchet/package.json for traceability / release-please pins.
# Sync: python3 scripts/sync_skill_version_to_values.py

lintRatchet:
  skillVersion: "1.2.0"

agent:
  systemPrompt: ""
  systemPromptFile: skills/lint-ratchet/resources/RATCHET.md
  image:
    repository: declarative-agent-library-chart
    tag: local
    pullPolicy: Never

triggerCron:
  enabled: true
  schedule: "0 * * * *"
  image: curlimages/curl:8.5.0
