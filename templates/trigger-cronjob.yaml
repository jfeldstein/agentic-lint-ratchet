{{- if .Values.triggerCron.enabled }}
{{- $chart := dict "Name" "declarative-agent-library-chart" "Version" "0.1.0" "AppVersion" "0.1.0" }}
{{- $agentVals := index .Values "agent" | required "Values.agent is required" }}
{{- $ctx := dict "Chart" $chart "Values" $agentVals "Release" .Release "Capabilities" .Capabilities "Template" .Template "Files" .Files }}
{{- $svcName := include "declarative-agent-library-chart.fullname" $ctx }}
{{- $port := (index $agentVals "service" | default dict).port | default 8088 }}
apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ .Release.Name }}-trigger-hourly
  labels:
    app.kubernetes.io/name: {{ .Chart.Name }}
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 3
  schedule: {{ .Values.triggerCron.schedule | quote }}
  jobTemplate:
    spec:
      backoffLimit: 2
      template:
        metadata:
          labels:
            app.kubernetes.io/name: {{ .Chart.Name }}
            app.kubernetes.io/instance: {{ .Release.Name }}
        spec:
          restartPolicy: OnFailure
          containers:
            - name: curl
              image: {{ .Values.triggerCron.image | quote }}
              args:
                - -sf
                - -X
                - POST
                - http://{{ $svcName }}:{{ $port }}/api/v1/trigger
{{- end }}
